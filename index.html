<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowMoments</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playpen+Sans+Thai:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="heading">
            <h1>MeowMoments</h1>
            <h3>Random Cat's Fun Facts</h3>
        </div>
        <div class="image">
            <img id="catImage" src="" alt="Cat Image">
        </div>
        <div class="cat-info">
            <div class="name">
                <p>Name: Sphynx</p>
            </div>
            <div class="info">
                <a href="link">More about Sphynx</a>
            </div>
        </div>
        <div class="fact">
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius, nihil fugiat, soluta beatae repellat
                rerum quasi reprehenderit quis impedit magnam unde quia corporis neque perferendis.
            </p>
        </div>
        <div class="generate">
            <button>Generate Fact</button>
        </div>
    </div>



    <script src="app.js"></script>
</body>

</html>
